<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Respirá | Respiración Consciente</title>

    <meta name="description"
        content="Respirá es una aplicación simple para practicar respiración consciente, reducir el estrés y volver al momento presente.">

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <!-- ==========================
         HEADER
    =========================== -->

    <header class="header">

        <div class="logo">

            <h1>Respirá</h1>

            <p>Respiración Consciente</p>

        </div>

    </header>



    <!-- ==========================
         MAIN
    =========================== -->

    <main class="app">

        <section class="breathing-section">

            <div id="breathingCircle" class="breathing-circle">

                <div class="inner-circle"></div>

            </div>

            <h2 id="instruction">

                Presioná comenzar

            </h2>

            <p id="phase">

                Tu práctica empieza cuando vos decidís.

            </p>

            <button id="startButton">

                Comenzar

            </button>

        </section>

    </main>



    <!-- ==========================
         FOOTER
    =========================== -->

    <footer>

        <small>

            Respirá v1.0 • Desarrollado con ♥ para entrenar la calma.

        </small>

    </footer>



    <!-- ==========================
         JAVASCRIPT
    =========================== -->

    <script src="js/app.js"></script>

</body>

</html>
